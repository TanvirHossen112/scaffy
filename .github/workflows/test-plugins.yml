name: Test Plugins

on:
  pull_request:
    paths:
      - 'registry/**'

jobs:
  validate-plugins:
    name: Validate Plugin Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run plugin validation tests
        run: npm run test:ci
